services:
  # --- THE MEDIA SERVER ---
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host # Required for smooth Plex local network discovery & DLNA
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${DOCKER_DIR}/plex:/config
      - ${MEDIA_DIR}:/data
    restart: unless-stopped

  # --- INDEXER MANAGEMENT ---
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_DIR}/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  # ============ DOWNLOADING ============
  # haugene/transmission-openvpn tunnels all transmission traffic through an
  # OpenVPN connection. NET_ADMIN + /dev/net/tun are required for the
  # in-container OpenVPN client. LOCAL_NETWORK must include your LAN CIDR
  # or the web UI on port 9091 will be unreachable from your machine.
  #transmission:
  #  container_name: transmission
  #  image: haugene/transmission-openvpn
  #  cap_add:
  #    - NET_ADMIN
  #  devices:
  #    - /dev/net/tun
  #  ports:
  #    - "9091:9091"
  #  environment:
  #    - PUID=${PUID}
  #    - PGID=${PGID}
  #    - TZ=${TZ}
  #    - OPENVPN_PROVIDER=${OPENVPN_PROVIDER:?OPENVPN_PROVIDER must be set}
  #    - OPENVPN_CONFIG=${OPENVPN_CONFIG:?OPENVPN_CONFIG must be set}
  #    - OPENVPN_USERNAME=${OPENVPN_USERNAME:?OPENVPN_USERNAME must be set}
  #    - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:?OPENVPN_PASSWORD must be set}
  #    - LOCAL_NETWORK=${LOCAL_NETWORK:-192.168.0.0/16}
  #    - TRANSMISSION_RPC_USERNAME=${TRANSMISSION_RPC_USERNAME:-}
  #    - TRANSMISSION_RPC_PASSWORD=${TRANSMISSION_RPC_PASSWORD:-}
  #  volumes:
  #    - ${DOCKER_DIR}/transmission-home:/config/transmission-home
  #    - ${MEDIA_DIR}:/data
  #  restart: unless-stopped

  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    ports:
      - 8080:8080 # Exposes qBittorrent Web UI
      - 6881:6881 # Torrent traffic (TCP)
      - 6881:6881/udp # Torrent traffic (UDP)
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${OPENVPN_USERNAME:?OPENVPN_USERNAME must be set}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD:?OPENVPN_PASSWORD must be set}
      - SERVER_REGIONS=Switzerland
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - VPN_PORT_FORWARDING_DOWN_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24
    volumes:
      - ${DOCKER_DIR}/gluetun:/gluetun    
    #command: update -providers "private internet access"  
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun" # Routes traffic through gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${DOCKER_DIR}:/config
      - ${MEDIA_DIR}:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  # --- TV SHOW AUTOMATION ---
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_DIR}/sonarr:/config
      - ${MEDIA_DIR}:/data
    ports:
      - 8989:8989
    restart: unless-stopped

  # --- MOVIE AUTOMATION ---
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${DOCKER_DIR}/radarr:/config
      - ${MEDIA_DIR}:/data
    ports:
      - 7878:7878
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    volumes:
      - ${DOCKER_DIR}/seerr/config:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

  # ============ MONITORING ============
  tautulli:
    container_name: tautulli
    image: tautulli/tautulli
    depends_on:
      - plex
    ports:
      - "8181:8181"
    environment:
      - TZ=${TZ}
    volumes:
      - ${DOCKER_DIR}/tautulli:/config
    restart: unless-stopped